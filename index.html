<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ledgexis | Advanced Diagnostic Lab Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Add libraries for PDF and Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Flatpickr for beautiful date range picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --primary-light: #7dd3fc;
            --secondary: #06b6d4;
            --accent: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            
            --bg-primary: #f0f9ff;
            --bg-secondary: #e0f2fe;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-light: #94a3b8;
            --border-color: #cbd5e1;
            --border-light: #e2e8f0;
            
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 15px -3px rgba(14, 165, 233, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(14, 165, 233, 0.15);
            --shadow-xl: 0 25px 50px -12px rgba(14, 165, 233, 0.25);
            
            --sidebar-w: 280px;
            --header-h: 70px;
            --border-radius: 16px;
            --border-radius-lg: 20px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .hidden { display: none !important; }

        /* === AUTHENTICATION === */
        #gateway {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 50%, #8b5cf6 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        #gateway::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 60px 50px;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow-xl);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: var(--shadow-lg);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .logo h1 {
            font-size: 2.8rem;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
            background: white;
            font-family: 'Inter', sans-serif;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
            transform: translateY(-1px);
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            width: 100%;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary), var(--info));
            color: white;
            box-shadow: var(--shadow);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
        }

        .btn-outline {
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .auth-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
        }

        .auth-link a:hover {
            color: var(--primary-dark);
        }

        .alert-box {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        /* === APP LAYOUT === */
        #app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-w);
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            border-right: 1px solid var(--border-light);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .sidebar-header {
            padding: 30px 24px;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(135deg, var(--primary), var(--accent));
            position: relative;
            overflow: hidden;
        }

        .sidebar-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 100%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .sidebar-logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .sidebar-header h2 {
            font-size: 1.6rem;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            color: white;
            letter-spacing: -0.5px;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 2px;
            font-weight: 500;
        }

        .sidebar-nav {
            padding: 24px 12px;
        }

        .nav-section {
            margin-bottom: 28px;
        }

        .nav-section-title {
            padding: 0 12px 8px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 14px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 12px;
            margin-bottom: 4px;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(14, 165, 233, 0.08);
            color: var(--primary);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.15), rgba(139, 92, 246, 0.1));
            color: var(--primary);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 70%;
            background: linear-gradient(180deg, var(--primary), var(--accent));
            border-radius: 0 4px 4px 0;
        }

        .nav-icon {
            font-size: 1.3rem;
            width: 24px;
            text-align: center;
        }

        .main-content {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 0;
            background: var(--bg-primary);
        }

        .top-header {
            background: white;
            padding: 0 32px;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 90;
            box-shadow: var(--shadow-sm);
        }

        .page-title-section h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
        }

        .page-title-section p {
            color: var(--text-light);
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-info:hover {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            border: 2px solid white;
            box-shadow: var(--shadow);
        }

        .user-details h4 {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .user-details p {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .user-info:hover .user-details p {
            color: rgba(255, 255, 255, 0.9);
        }

        .content-area {
            padding: 32px;
        }

        /* === CARDS & STATS === */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            padding: 28px;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .stat-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: var(--shadow);
        }

        .stat-icon.primary { 
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.15), rgba(14, 165, 233, 0.05)); 
            color: var(--primary); 
        }
        .stat-icon.success { 
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05)); 
            color: var(--success); 
        }
        .stat-icon.warning { 
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05)); 
            color: var(--warning); 
        }
        .stat-icon.danger { 
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(239, 68, 68, 0.05)); 
            color: var(--danger); 
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-family: 'Poppins', sans-serif;
            letter-spacing: -1px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .stat-trend {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 8px;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .stat-trend.up {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .stat-trend.down {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .card {
            background: white;
            padding: 28px;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-light);
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--bg-secondary);
        }

        .card-header h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* === TABLES === */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        thead {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
        }

        th {
            text-align: left;
            padding: 16px 20px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--primary);
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: all 0.3s;
        }

        tbody tr:hover {
            background: var(--bg-secondary);
            transform: scale(1.01);
        }

        /* === BADGES === */
        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-success { 
            background: linear-gradient(135deg, #dcfce7, #bbf7d0); 
            color: #166534;
            border: 1px solid #86efac;
        }
        .badge-warning { 
            background: linear-gradient(135deg, #fef3c7, #fde68a); 
            color: #92400e;
            border: 1px solid #fcd34d;
        }
        .badge-danger { 
            background: linear-gradient(135deg, #fee2e2, #fecaca); 
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        .badge-primary { 
            background: linear-gradient(135deg, #dbeafe, #bfdbfe); 
            color: #1e40af;
            border: 1px solid #93c5fd;
        }
        .badge-secondary { 
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb); 
            color: #374151;
            border: 1px solid #d1d5db;
        }
        .badge-purple {
            background: linear-gradient(135deg, #e9d5ff, #d8b4fe);
            color: #6b21a8;
            border: 1px solid #c084fc;
        }

        /* === FORMS === */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            justify-content: flex-end;
            padding-top: 24px;
            border-top: 2px solid var(--bg-secondary);
        }

        /* === ALERTS === */
        .alert {
            padding: 18px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
        }

        .alert-warning {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-left: 4px solid var(--warning);
            color: #92400e;
        }

        .alert-success-box {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            border-left: 4px solid var(--success);
            color: #166534;
        }

        .alert-info {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            border-left: 4px solid var(--info);
            color: #1e40af;
        }

        /* === BILL TEMPLATE === */
        .bill-template {
            background: white;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
        }

        .bill-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 20px;
        }

        .bill-header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .bill-header p {
            color: var(--text-secondary);
            margin: 5px 0;
        }

        .bill-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .bill-table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
        }

        .bill-table th,
        .bill-table td {
            padding: 15px;
            border: 1px solid var(--border-light);
            text-align: left;
        }

        .bill-table th {
            background: var(--bg-secondary);
            font-weight: 600;
        }

        .bill-total {
            text-align: right;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--primary);
        }

        .bill-total h3 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .bill-footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* === PAYMENT METHOD STYLES === */
        .payment-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .payment-option {
            background: white;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .payment-option:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .payment-option.selected {
            border-color: var(--success);
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
        }

        .payment-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .payment-label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .payment-details {
            margin-top: 20px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;

<script>
    // ============================================
    // DATABASE ENGINE (LocalStorage Based)
    // ============================================
    
    const DB = {
        // Initialize database structure
        init() {
            if (!localStorage.getItem('ledgexis_users')) {
                localStorage.setItem('ledgexis_users', JSON.stringify([]));
            }
            if (!localStorage.getItem('ledgexis_current_user')) {
                localStorage.setItem('ledgexis_current_user', '');
            }
            // Initialize user-specific data when logged in
            const currentUser = this.getCurrentUser();
            if (currentUser) {
                this.initUserData(currentUser.email);
            }
        },

        initUserData(email) {
            const prefix = `ledgexis_${email}_`;
            
            const tables = [
                'patients',
                'invoices',
                'payments',
                'stock',
                'ledgers',
                'vouchers',
                'settings',
                'reports',
                'expenses',
                'bills'
            ];

            tables.forEach(table => {
                const key = prefix + table;
                if (!localStorage.getItem(key)) {
                    localStorage.setItem(key, JSON.stringify([]));
                }
            });

            // Initialize default ledgers if not exists
            if (this.get('ledgers').length === 0) {
                this.initDefaultLedgers();
            }

            // Initialize settings
            if (this.get('settings').length === 0) {
                this.save('settings', [{
                    id: 'config',
                    financialYear: '2026-27',
                    gstEnabled: true,
                    gstRate: 5,
                    invoicePrefix: 'INV-2026-',
                    labName: this.getCurrentUser().labName || 'Lab',
                    invoiceCounter: 1000,
                    address: '123 Medical Street, Healthcare City',
                    phone: '+91 9876543210',
                    email: 'info@ledgexis.com',
                    taxId: 'GSTIN-27AAAAA0000A1Z5'
                }]);
            }
        },

        initDefaultLedgers() {
            const defaultLedgers = [
                // Assets
                { id: 'cash', name: 'Cash Account', group: 'Cash', type: 'asset', balance: 0 },
                { id: 'bank', name: 'Bank Account', group: 'Bank', type: 'asset', balance: 0 },
                { id: 'inventory', name: 'Lab Stock Inventory', group: 'Inventory', type: 'asset', balance: 0 },
                
                // Liabilities
                { id: 'suppliers', name: 'Suppliers Payable', group: 'Liabilities', type: 'liability', balance: 0 },
                
                // Income
                { id: 'test-income', name: 'Diagnostic Test Income', group: 'Income', type: 'income', balance: 0 },
                { id: 'other-income', name: 'Other Income', group: 'Income', type: 'income', balance: 0 },
                
                // Expenses
                { id: 'reagents-expense', name: 'Reagents & Consumables Expense', group: 'Expenses', type: 'expense', balance: 0 },
                { id: 'salary-expense', name: 'Salaries & Wages', group: 'Expenses', type: 'expense', balance: 0 },
                { id: 'rent-expense', name: 'Rent & Utilities', group: 'Expenses', type: 'expense', balance: 0 },
                { id: 'other-expense', name: 'Other Expenses', group: 'Expenses', type: 'expense', balance: 0 }
            ];

            this.save('ledgers', defaultLedgers);
        },

        getCurrentUserEmail() {
            const user = this.getCurrentUser();
            return user ? user.email : '';
        },

        getKey(table) {
            const email = this.getCurrentUserEmail();
            return `ledgexis_${email}_${table}`;
        },

        save(table, data) {
            localStorage.setItem(this.getKey(table), JSON.stringify(data));
        },

        get(table) {
            const data = localStorage.getItem(this.getKey(table));
            return data ? JSON.parse(data) : [];
        },

        add(table, item) {
            const data = this.get(table);
            data.push(item);
            this.save(table, data);
            return item;
        },

        update(table, id, updatedItem) {
            const data = this.get(table);
            const index = data.findIndex(item => item.id === id);
            if (index !== -1) {
                data[index] = { ...data[index], ...updatedItem };
                this.save(table, data);
                return data[index];
            }
            return null;
        },

        delete(table, id) {
            const data = this.get(table);
            const filtered = data.filter(item => item.id !== id);
            this.save(table, filtered);
        },

        // User management
        getUsers() {
            const users = localStorage.getItem('ledgexis_users');
            return users ? JSON.parse(users) : [];
        },

        saveUsers(users) {
            localStorage.setItem('ledgexis_users', JSON.stringify(users));
        },

        getCurrentUser() {
            const email = localStorage.getItem('ledgexis_current_user');
            if (!email) return null;
            const users = this.getUsers();
            return users.find(u => u.email === email) || null;
        },

        setCurrentUser(email) {
            localStorage.setItem('ledgexis_current_user', email);
            if (email) {
                this.initUserData(email);
            }
        },

        // Ledger operations
        updateLedgerBalance(ledgerId, amount, isDebit) {
            const ledgers = this.get('ledgers');
            const ledger = ledgers.find(l => l.id === ledgerId);
            if (!ledger) return;

            // Debit increases assets/expenses, decreases liabilities/income
            // Credit increases liabilities/income, decreases assets/expenses
            if (ledger.type === 'asset' || ledger.type === 'expense') {
                ledger.balance += isDebit ? amount : -amount;
            } else {
                ledger.balance += isDebit ? -amount : amount;
            }

            this.save('ledgers', ledgers);
        },

        // Create accounting voucher
        createVoucher(type, entries, reference, description) {
            const voucher = {
                id: 'VCH-' + Date.now(),
                type, // SALE, RECEIPT, PAYMENT, PURCHASE
                date: new Date().toISOString(),
                entries, // [{ledgerId, amount, isDebit}]
                reference,
                description
            };

            // Process each entry
            entries.forEach(entry => {
                this.updateLedgerBalance(entry.ledgerId, entry.amount, entry.isDebit);
            });

            this.add('vouchers', voucher);
            return voucher;
        },

        // Get patient ledger
        getPatientLedger(patientId) {
            const ledgers = this.get('ledgers');
            let ledger = ledgers.find(l => l.patientId === patientId);
            
            if (!ledger) {
                // Create new patient ledger
                const patients = this.get('patients');
                const patient = patients.find(p => p.id === patientId);
                if (!patient) return null;

                ledger = {
                    id: 'patient-' + patientId,
                    name: `Patient: ${patient.name}`,
                    group: 'Accounts Receivable',
                    type: 'asset',
                    balance: 0,
                    patientId: patientId
                };
                ledgers.push(ledger);
                this.save('ledgers', ledgers);
            }

            return ledger;
        },

        // Get supplier ledger
        getSupplierLedger(supplierName) {
            const ledgers = this.get('ledgers');
            const supplierId = 'supplier-' + supplierName.toLowerCase().replace(/\s/g, '-');
            let ledger = ledgers.find(l => l.id === supplierId);
            
            if (!ledger) {
                ledger = {
                    id: supplierId,
                    name: `Supplier: ${supplierName}`,
                    group: 'Accounts Payable',
                    type: 'liability',
                    balance: 0
                };
                ledgers.push(ledger);
                this.save('ledgers', ledgers);
            }

            return ledger;
        },

        // Payment methods
        getPaymentMethods() {
            return [
                { id: 'cash', name: 'Cash', icon: '💵' },
                { id: 'card', name: 'Card', icon: '💳' },
                { id: 'upi', name: 'UPI', icon: '📱' },
                { id: 'bank_transfer', name: 'Bank Transfer', icon: '🏦' },
                { id: 'cheque', name: 'Cheque', icon: '✍️' },
                { id: 'insurance', name: 'Insurance', icon: '🛡️' }
            ];
        }
    };

    // ============================================
    // AUTHENTICATION SYSTEM
    // ============================================

    let isRegisterMode = false;

    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const authToggle = document.getElementById('authToggle');

        if (isRegisterMode) {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            authToggle.innerHTML = 'Already have an account? <a onclick="toggleAuthMode()">Login here</a>';
        } else {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            authToggle.innerHTML = 'Don\'t have an account? <a onclick="toggleAuthMode()">Register here</a>';
        }
        document.getElementById('authMessage').innerHTML = '';
    }

    function showAuthMessage(message, isError = false) {
        const messageDiv = document.getElementById('authMessage');
        messageDiv.innerHTML = `<div class="alert-box ${isError ? 'alert-error' : 'alert-success'}">${message}</div>`;
        setTimeout(() => {
            messageDiv.innerHTML = '';
        }, 5000);
    }

    // Registration
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const labName = document.getElementById('regLabName').value.trim();
        const email = document.getElementById('regEmail').value.trim().toLowerCase();
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;
        const contact = document.getElementById('regContact').value.trim();

        // Validation
        if (password !== confirmPassword) {
            showAuthMessage('❌ Passwords do not match!', true);
            return;
        }

        if (password.length < 6) {
            showAuthMessage('❌ Password must be at least 6 characters!', true);
            return;
        }

        // Check if user already exists
        const users = DB.getUsers();
        if (users.find(u => u.email === email)) {
            showAuthMessage('❌ Email already registered!', true);
            return;
        }

        // Create new user
        const newUser = {
            id: 'USER-' + Date.now(),
            labName,
            email,
            password, // In production, hash this!
            contact,
            createdAt: new Date().toISOString()
        };

        users.push(newUser);
        DB.saveUsers(users);

        showAuthMessage('✅ Registration successful! Please login.', false);
        
        // Switch to login mode
        setTimeout(() => {
            toggleAuthMode();
            document.getElementById('loginEmail').value = email;
        }, 1500);

        this.reset();
    });

    // Login
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const email = document.getElementById('loginEmail').value.trim().toLowerCase();
        const password = document.getElementById('loginPassword').value;

        const users = DB.getUsers();
        const user = users.find(u => u.email === email && u.password === password);

        if (!user) {
            showAuthMessage('❌ Invalid email or password!', true);
            return;
        }

        // Login successful
        DB.setCurrentUser(email);
        
        // Update UI
        document.getElementById('gateway').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        
        // Update user info
        document.getElementById('userName').textContent = user.labName;
        document.getElementById('userAvatar').textContent = user.labName.substring(0, 2).toUpperCase();
        
        initApp();
    });

    // Logout
    function showLogoutOption() {
        if (confirm('Do you want to logout?')) {
            DB.setCurrentUser('');
            location.reload();
        }
    }

    // ============================================
    // APPLICATION STATE
    // ============================================
    
    const state = {
        currentPage: 'overview',
        currentBill: null,
        patientFilter: {
            text: '',
            startDate: null,
            endDate: null,
            reportType: 'all', // all, pending, completed, urgent
            datePreset: 'last30days'
        }
    };

    // Navigation Items (Combined from both codes)
    const navItems = [
        { section: 'Main', items: [
            { id: 'overview', icon: '📊', label: 'Dashboard' },
            { id: 'patient-registration', icon: '🩺', label: 'Patients' },
            { id: 'reports', icon: '📋', label: 'Reports' }
        ]},
        { section: 'Financial', items: [
            { id: 'billing', icon: '🧾', label: 'Billing' },
            { id: 'billing-history', icon: '📜', label: 'Billing History' },
            { id: 'invoice', icon: '💳', label: 'Invoice' },
            { id: 'finance', icon: '💰', label: 'Finance' }
        ]},
        { section: 'Operations', items: [
            { id: 'stock-payments', icon: '📦', label: 'Stock & Payments' },
            { id: 'ledgers', icon: '📖', label: 'Ledgers' },
            { id: 'settings', icon: '⚙️', label: 'Settings' }
        ]}
    ];

    // Initialize Application
    function initApp() {
        DB.init();
        renderSidebar();
        navigate('overview');
    }

    // Render Sidebar
    function renderSidebar() {
        const nav = document.getElementById('sidebarNav');
        nav.innerHTML = navItems.map(section => `
            <div class="nav-section">
                <div class="nav-section-title">${section.section}</div>
                ${section.items.map(item => `
                    <a class="nav-item" onclick="navigate('${item.id}')" id="nav-${item.id}">
                        <span class="nav-icon">${item.icon}</span>
                        <span>${item.label}</span>
                    </a>
                `).join('')}
            </div>
        `).join('');
    }

    // Navigation Handler
    function navigate(page) {
        state.currentPage = page;
        
        // Update active nav
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        const activeNav = document.getElementById(`nav-${page}`);
        if (activeNav) activeNav.classList.add('active');
        
        // Update page title
        const allItems = navItems.flatMap(s => s.items);
        const pageItem = allItems.find(item => item.id === page);
        document.getElementById('pageTitle').textContent = pageItem ? pageItem.label : 'Dashboard';
        document.getElementById('pageBreadcrumb').textContent = `Home / ${pageItem ? pageItem.label : 'Dashboard'}`;
        
        // Render view
        renderView(page);
    }

    // Render Views
    function renderView(page) {
        const view = document.getElementById('mainView');
        
        switch(page) {
            case 'overview':
                view.innerHTML = renderOverview();
                break;
            case 'patient-registration':
                view.innerHTML = renderPatientRegistration();
                attachPatientFormHandler();
                break;
            case 'reports':
                view.innerHTML = renderReports();
                setTimeout(() => {
                    initializeReportsCalendar();
                    attachReportsEventListeners();
                }, 100);
                break;
            case 'billing':
                view.innerHTML = renderBilling();
                attachBillingFormHandler();
                break;
            case 'billing-history':
                view.innerHTML = renderBillingHistory();
                break;
            case 'invoice':
                view.innerHTML = renderInvoice();
                attachInvoiceFormHandler();
                break;
            case 'stock-payments':
                view.innerHTML = renderStockPayments();
                attachStockFormHandler();
                break;
            case 'finance':
                view.innerHTML = renderFinance();
                break;
            case 'ledgers':
                view.innerHTML = renderLedgers();
                break;
            case 'settings':
                view.innerHTML = renderSettings();
                break;
            default:
                view.innerHTML = '<div class="card"><h3>Page not found</h3></div>';
        }
    }

    function renderPatientRows(patients) {
        if (patients.length === 0) {
            return '<tr><td colspan="7" style="text-align: center; padding: 40px;">No patients registered yet</td></tr>';
        }

        return patients.reverse().map(patient => `
            <tr>
                <td><strong>${patient.id}</strong></td>
                <td>${patient.name}</td>
                <td>${patient.age} / ${patient.gender}</td>
                <td>${patient.contact}</td>
                <td>${patient.testType}</td>
                <td><span class="badge badge-${getStatusBadge(patient.status)}">${patient.status}</span></td>
                <td>${new Date(patient.registeredAt).toLocaleDateString()}</td>
            </tr>
        `).join('');
    }

    function getStatusBadge(status) {
        const badges = {
            'registered': 'primary',
            'collected': 'secondary',
            'processing': 'warning',
            'ready': 'success'
        };
        return badges[status] || 'secondary';
    }

    function filterPatients() {
        const search = document.getElementById('patientSearch').value.toLowerCase();

        const filtered = patients.filter(p => 
            p.name.toLowerCase().includes(search) ||
            p.id.toLowerCase().includes(search) ||
            p.contact.includes(search)
        );
        document.getElementById('patientTableBody').innerHTML = renderPatientRows(filtered);
    }

    function selectPaymentMethod(methodId) {
        // Update UI
        document.querySelectorAll('.payment-option').forEach(option => {
            option.classList.remove('selected');
        });
        document.querySelector(`[data-method="${methodId}"]`).classList.add('selected');
        
        // Show payment details
        const detailsDiv = document.getElementById('paymentDetails');
        detailsDiv.classList.add('active');
        
        // Update payment method label
        const methods = DB.getPaymentMethods();
        const selectedMethod = methods.find(m => m.id === methodId);
        document.getElementById('paymentMethodLabel').textContent = `${selectedMethod.name} Details`;
        
        // Update reference placeholder
        const placeholders = {
            'cash': 'Cash Receipt Number',
            'card': 'Card Last 4 Digits',
            'upi': 'UPI Transaction ID',
            'bank_transfer': 'Bank Transaction ID',
            'cheque': 'Cheque Number',
            'insurance': 'Insurance Claim ID'
        };
        document.getElementById('paymentReference').placeholder = placeholders[methodId] || 'Reference ID';
        
        // Update display
        document.getElementById('selectedPaymentDisplay').innerHTML = `${selectedMethod.icon} ${selectedMethod.name}`;
    }

    function populateBillingPatientInfo(select) {
        const patientId = select.value;
        if (!patientId) return;
        
        const patients = DB.get('patients');
        const patient = patients.find(p => p.id === patientId);
        if (patient) {
            document.querySelector('[name="testName"]').value = patient.testType;
            // Auto-calculate price based on test type
            const prices = {
                'CBC': 800,
                'Lipid': 1200,
                'Thyroid': 1500,
                'Diabetes': 900,
                'LFT': 1100,
                'KFT': 1000
            };
            const price = prices[patient.testType] || 0;
            document.getElementById('billingCharges').value = price;
            calculateBillingTotal();
        }
    }

    function calculateBillingTotal() {
        const charges = parseFloat(document.getElementById('billingCharges').value) || 0;
        const discount = parseFloat(document.getElementById('billingDiscount').value) || 0;
        const gst = parseFloat(document.getElementById('billingGST').value) || 0;

        const discountAmount = charges * (discount / 100);
        const afterDiscount = charges - discountAmount;
        const gstAmount = afterDiscount * (gst / 100);
        const netAmount = afterDiscount + gstAmount;

        // Update display
        document.getElementById('displayCharges').textContent = '₹' + charges.toFixed(2);
        document.getElementById('displayDiscount').textContent = discount;
        document.getElementById('displayDiscountAmount').textContent = '-₹' + discountAmount.toFixed(2);
        document.getElementById('displayGST').textContent = gst;
        document.getElementById('displayGSTAmount').textContent = '₹' + gstAmount.toFixed(2);
        document.getElementById('displayNetAmount').textContent = '₹' + netAmount.toFixed(2);
        
        // Update payment amount
        document.getElementById('paymentAmount').value = netAmount;
    }

    function quickFillTest(testName, price) {
        document.querySelector('[name="testName"]').value = testName;
        document.getElementById('billingCharges').value = price;

            }

            const charges = parseFloat(formData.get('charges')) || 0;
            const discount = parseFloat(formData.get('discount')) || 0;
            const gst = parseFloat(formData.get('gst')) || 0;
            const discountAmount = charges * (discount / 100);
            const afterDiscount = charges - discountAmount;
            const gstAmount = afterDiscount * (gst / 100);
            const netAmount = afterDiscount + gstAmount;

            const bill = {
                id: 'BILL-' + Date.now(),
                billNo: formData.get('billNo'),
                billDate: formData.get('billDate'),
                patientId: patient.id,
                patientName: patient.name,
                testName: formData.get('testName'),
                charges: charges,
                discount: discount,
                discountAmount: discountAmount,
                gst: gst,
                gstAmount: gstAmount,
                netAmount: netAmount,
                paymentMethod: document.querySelector('.payment-option.selected')?.dataset.method || 'cash',
                paymentAmount: parseFloat(formData.get('paymentAmount')) || netAmount,
                paymentReference: formData.get('paymentReference') || '',
                paymentStatus: formData.get('paymentStatus') || 'completed',
                created: new Date().toISOString()
            };

            // Save bill
            DB.add('bills', bill);

            // Update invoice counter
            settings.invoiceCounter = (settings.invoiceCounter || 1000) + 1;
            DB.save('settings', [settings]);

            // Create accounting entries
            const patientLedger = DB.getPatientLedger(patient.id);
            
            // Sale entry
            DB.createVoucher('SALE', [
                { ledgerId: patientLedger.id, amount: netAmount, isDebit: true },
                { ledgerId: 'test-income', amount: netAmount, isDebit: false }
            ], bill.billNo, `Bill for ${patient.name}`);

            // Payment entry if completed
            if (bill.paymentStatus === 'completed') {
                const cashLedger = bill.paymentMethod === 'cash' ? 'cash' : 'bank';
                DB.createVoucher('RECEIPT', [
                    { ledgerId: cashLedger, amount: bill.paymentAmount, isDebit: true },
                    { ledgerId: patientLedger.id, amount: bill.paymentAmount, isDebit: false }
                ], bill.billNo, `Payment received from ${patient.name}`);
            }

            alert(`✅ Bill generated successfully!\nBill No: ${bill.billNo}\nAmount: ₹${netAmount.toFixed(2)}`);
            resetBillingForm();
        });
    }

    // Helper function to convert number to words
    function numberToWords(num) {
        const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine'];
        const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
        const teens = ['Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
        
        function convertToWords(n) {
            if (n === 0) return 'Zero';
            if (n < 10) return ones[n];
            if (n < 20) return teens[n - 10];
            if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 !== 0 ? ' ' + ones[n % 10] : '');
            if (n < 1000) return ones[Math.floor(n / 100)] + ' Hundred' + (n % 100 !== 0 ? ' and ' + convertToWords(n % 100) : '');
            if (n < 100000) return convertToWords(Math.floor(n / 1000)) + ' Thousand' + (n % 1000 !== 0 ? ' ' + convertToWords(n % 1000) : '');
            if (n < 10000000) return convertToWords(Math.floor(n / 100000)) + ' Lakh' + (n % 100000 !== 0 ? ' ' + convertToWords(n % 100000) : '');
            return convertToWords(Math.floor(n / 10000000)) + ' Crore' + (n % 10000000 !== 0 ? ' ' + convertToWords(n % 10000000) : '');
        }
        
        const rupees = Math.floor(num);
        const paise = Math.round((num - rupees) * 100);
        let words = convertToWords(rupees) + ' Rupees';
        if (paise > 0) {
            words += ' and ' + convertToWords(paise) + ' Paise';
        }
        words += ' Only';
        return words;
    }

    function exportSelectedBillsToPDF() {
        const selectedBills = getSelectedBills();
        if (selectedBills.length === 0) {
            alert('Please select bills to export!');
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const settings = DB.get('settings')[0] || {};

        let yPos = 20;
        let page = 1;

        selectedBills.forEach((bill, index) => {
            if (index > 0 && yPos > 200) {
                doc.addPage();
                yPos = 20;
                page++;
            }

            // Header for each bill
            doc.setFontSize(14);
            doc.setTextColor(14, 165, 233);
            doc.text(`Bill ${index + 1} of ${selectedBills.length}`, 20, yPos);
            doc.setDrawColor(14, 165, 233);
            doc.line(20, yPos + 2, 60, yPos + 2);

            yPos += 10;

            // Bill details
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            doc.text(`Bill No: ${bill.billNo}`, 20, yPos);
            doc.text(`Date: ${new Date(bill.billDate).toLocaleDateString()}`, 100, yPos);
            yPos += 6;
            doc.text(`Patient: ${bill.patientName}`, 20, yPos);
            doc.text(`Test: ${bill.testName}`, 100, yPos);
            yPos += 6;
            doc.text(`Amount: ₹${bill.netAmount.toFixed(2)}`, 20, yPos);
            doc.text(`Payment: ${bill.paymentMethod.toUpperCase()}`, 100, yPos);
            yPos += 6;
            doc.text(`Status: ${bill.paymentStatus.toUpperCase()}`, 20, yPos);
            yPos += 10;

            // Separator
            doc.setDrawColor(200, 200, 200);
            doc.line(20, yPos, 190, yPos);
            yPos += 15;
        });

        // Add page numbers
        const totalPages = doc.internal.getNumberOfPages();
        for (let i = 1; i <= totalPages; i++) {
            doc.setPage(i);
            doc.setFontSize(8);
            doc.setTextColor(150, 150, 150);
            doc.text(`Page ${i} of ${totalPages}`, 190, 287, { align: 'right' });
            doc.text(`Generated on ${new Date().toLocaleDateString()}`, 20, 287);

        doc.save(`Bills-Export-${new Date().toISOString().split('T')[0]}.pdf`);
    }

    function populatePatientInfo(select) {
        const option = select.options[select.selectedIndex];
        if (option.value) {
            document.getElementById('patientName').value = option.dataset.name;
            document.getElementById('testName').value = option.dataset.test;
        } else {
            document.getElementById('patientName').value = '';
            document.getElementById('testName').value = '';
        }
    }

    function calculateInvoice() {
        const charges = parseFloat(document.getElementById('invoiceCharges').value) || 0;
        const discount = parseFloat(document.getElementById('invoiceDiscount').value) || 0;
        const gst = parseFloat(document.getElementById('invoiceGST').value) || 0;

        const discountAmount = charges * (discount / 100);
        const afterDiscount = charges - discountAmount;
        const gstAmount = afterDiscount * (gst / 100);
        const total = afterDiscount + gstAmount;

        document.getElementById('netAmount').value = '₹' + total.toFixed(2);
    }

    function calculateStockTotal() {
        const qty = parseFloat(document.getElementById('stockQty').value) || 0;
        const rate = parseFloat(document.getElementById('stockRate').value) || 0;
        const total = qty * rate;

        document.getElementById('stockTotal').value = '₹' + total.toFixed(2);
    }

    function attachInvoiceFormHandler() {
        const invoiceForm = document.getElementById('invoiceForm');
        if (invoiceForm) {
            invoiceForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const formData = new FormData(this);
                const settings = DB.get('settings')[0] || {};
                
                const charges = parseFloat(formData.get('charges'));
                const discount = parseFloat(formData.get('discount')) || 0;
                const gst = parseFloat(formData.get('gst')) || 0;
                const discountAmount = charges * (discount / 100);
                const afterDiscount = charges - discountAmount;
                const gstAmount = afterDiscount * (gst / 100);
                const netAmount = afterDiscount + gstAmount;

                const invoice = {
                    id: 'INV-' + Date.now(),
                    invoiceNo: formData.get('invoiceNo'),
                    patientId: formData.get('patientId'),
                    patientName: formData.get('patientName'),
                    testName: formData.get('testName'),
                    charges: charges,
                    discount: discount,
                    discountAmount: discountAmount,
                    gst: gst,
                    gstAmount: gstAmount,
                    netAmount: netAmount,
                    paymentStatus: formData.get('paymentStatus'),
                    date: new Date().toISOString(),
                    paidAmount: formData.get('paymentStatus') === 'paid' ? netAmount : 0
                };

                // Save invoice
                DB.add('invoices', invoice);

                // Increment invoice counter
                settings.invoiceCounter = (settings.invoiceCounter || 1000) + 1;
                DB.save('settings', [settings]);

                // Create accounting voucher (Sales)
                const patientLedger = DB.getPatientLedger(invoice.patientId);
                DB.createVoucher('SALE', [
                    { ledgerId: patientLedger.id, amount: netAmount, isDebit: true },
                    { ledgerId: 'test-income', amount: netAmount, isDebit: false }
                ], invoice.invoiceNo, `Sale to ${invoice.patientName}`);

                // If paid, record payment
                if (invoice.paymentStatus === 'paid') {
                    DB.createVoucher('RECEIPT', [
                        { ledgerId: 'cash', amount: netAmount, isDebit: true },
                        { ledgerId: patientLedger.id, amount: netAmount, isDebit: false }
                    ], invoice.invoiceNo, `Payment received from ${invoice.patientName}`);
                }

                alert('✅ Invoice created successfully!\nInvoice No: ' + invoice.invoiceNo);
                this.reset();
                calculateInvoice();
            });
        }
    }

    function attachStockFormHandler() {
        const stockForm = document.getElementById('stockPurchaseForm');
        if (stockForm) {
            stockForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const formData = new FormData(this);
                const qty = parseFloat(formData.get('quantity'));
                const rate = parseFloat(formData.get('rate'));
                const total = qty * rate;

                const purchase = {
                    id: 'PUR-' + Date.now(),
                    poNumber: formData.get('poNumber'),
                    supplierName: formData.get('supplierName'),
                    supplierContact: formData.get('supplierContact'),
                    itemName: formData.get('itemName'),
                    category: formData.get('category'),
                    quantity: qty,
                    rate: rate,
                    total: total,
                    paymentStatus: formData.get('paymentStatus'),
                    date: new Date().toISOString()
                };

                // Add to stock
                const stock = DB.get('stock');
                let existing = stock.find(s => s.itemName === purchase.itemName);
                if (existing) {
                    existing.quantity += qty;
                    existing.lastPurchase = purchase.date;
                    DB.save('stock', stock);
                } else {
                    DB.add('stock', {
                        id: 'STK-' + Date.now(),
                        itemName: purchase.itemName,
                        category: purchase.category,
                        quantity: qty,
                        rate: rate,
                        reorderLevel: Math.floor(qty * 0.2),
                        lastPurchase: purchase.date
                    });
                }

                // Create accounting voucher (Purchase)
                const supplierLedger = DB.getSupplierLedger(purchase.supplierName);
                DB.createVoucher('PURCHASE', [
                    { ledgerId: 'inventory', amount: total, isDebit: true },
                    { ledgerId: supplierLedger.id, amount: total, isDebit: false }
                ], purchase.poNumber, `Purchase from ${purchase.supplierName}`);

                // If paid, record payment
                if (purchase.paymentStatus === 'paid') {
                    DB.createVoucher('PAYMENT', [
                        { ledgerId: supplierLedger.id, amount: total, isDebit: true },
                        { ledgerId: 'cash', amount: total, isDebit: false }
                    ], purchase.poNumber, `Payment to ${purchase.supplierName}`);
                }

                alert('✅ Stock purchase recorded!\nPO: ' + purchase.poNumber);
                this.reset();
                calculateStockTotal();
            });
        }
    }

    function getFilteredPatients() {
        const patients = DB.get('patients');
        
        return patients.filter(p => {
            // Text search filter
            const searchText = (state.patientFilter.text || '').toLowerCase();
            const textMatch = !searchText || 
                (p.name && p.name.toLowerCase().includes(searchText)) ||
                (p.id && p.id.toLowerCase().includes(searchText)) ||
                (p.contact && p.contact.includes(searchText)) ||
                (p.testType && p.testType.toLowerCase().includes(searchText)) ||
                (p.doctor && p.doctor.toLowerCase().includes(searchText));

            // Date filter
            let dateMatch = true;
            if (state.patientFilter.startDate && state.patientFilter.endDate) {
                const regDate = new Date(p.registeredAt);
                const start = new Date(state.patientFilter.startDate);
                const end = new Date(state.patientFilter.endDate);
                start.setHours(0, 0, 0, 0);
                end.setHours(23, 59, 59, 999);
                dateMatch = regDate >= start && regDate <= end;
            }

            // Status/type filter
            let typeMatch = true;
            if (state.patientFilter.reportType === 'urgent') {
                typeMatch = p.priority === 'urgent' || p.priority === 'stat';
            } else if (state.patientFilter.reportType === 'pending') {
                typeMatch = p.status !== 'ready' && p.status !== 'completed';
            } else if (state.patientFilter.reportType === 'completed') {
                typeMatch = p.status === 'ready' || p.status === 'completed';
            }

            return textMatch && dateMatch && typeMatch;
        });
    }

    function getDailyRegistrationData(patients) {
        const dailyMap = new Map();
        const today = new Date();
        const last30Days = [];
        
        // Initialize last 30 days
        for (let i = 29; i >= 0; i--) {
            const date = new Date();
            date.setDate(today.getDate() - i);
            const dateStr = date.toLocaleDateString('en-IN', { day: '2-digit', month: '2-digit' });
            dailyMap.set(dateStr, 0);
            last30Days.push(dateStr);
        }

        // Count registrations per day
        patients.forEach(p => {
            const regDate = new Date(p.registeredAt);
            const dateStr = regDate.toLocaleDateString('en-IN', { day: '2-digit', month: '2-digit' });
            if (dailyMap.has(dateStr)) {
                dailyMap.set(dateStr, dailyMap.get(dateStr) + 1);
            }
        });

        return last30Days.map(date => ({
            date: date,
            count: dailyMap.get(date) || 0
        }));
    }

    function getTestDistribution(patients) {
        const testMap = new Map();
        patients.forEach(p => {
            if (p.testType) {
                testMap.set(p.testType, (testMap.get(p.testType) || 0) + 1);
            }
        });
        
        return Array.from(testMap.entries())
            .map(([test, count]) => ({ test, count }))
            .sort((a, b) => b.count - a.count);
    }

    function formatDate(date) {
        if (!date) return 'N/A';
        return new Date(date).toLocaleDateString('en-IN', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric'
        });
    }

    function setDatePreset(preset) {
        const end = new Date();
        let start = new Date();
        
        switch(preset) {
            case 'today':
                start = new Date();
                break;
            case 'yesterday':
                start.setDate(start.getDate() - 1);
                end.setDate(end.getDate() - 1);
                break;
            case 'last7days':
                start.setDate(start.getDate() - 6);
                break;
            case 'last30days':
                start.setDate(start.getDate() - 29);
                break;
            case 'thisMonth':
                start = new Date(end.getFullYear(), end.getMonth(), 1);
                break;
            case 'lastMonth':
                start = new Date(end.getFullYear(), end.getMonth() - 1, 1);
                end.setDate(0);
                break;
            case 'thisYear':
                start = new Date(end.getFullYear(), 0, 1);
                break;
        }
        
        state.patientFilter.startDate = start;
        state.patientFilter.endDate = end;
        state.patientFilter.datePreset = preset;
        
        // Update date picker
        if (reportsDatePicker) {
            reportsDatePicker.setDate([start, end]);
        }
        
        // Refresh reports view
        if (state.currentPage === 'reports') {
            renderView('reports');
        }
    }

    function setReportType(type) {
        state.patientFilter.reportType = type;
        renderView('reports');
    }

    function initializeReportsCalendar() {
        // Initialize date range picker
        const dateInput = document.getElementById('reportsDateRangePicker');
        if (!dateInput) return;
        
        if (reportsDatePicker) {
            reportsDatePicker.destroy();
        }
        
        const startDate = state.patientFilter.startDate || new Date(new Date().setDate(new Date().getDate() - 30));
        const endDate = state.patientFilter.endDate || new Date();
        
        reportsDatePicker = flatpickr(dateInput, {
            mode: 'range',
            dateFormat: 'd-m-Y',
            defaultDate: [startDate, endDate],
            onChange: function(selectedDates) {
                if (selectedDates.length === 2) {
                    state.patientFilter.startDate = selectedDates[0];
                    state.patientFilter.endDate = selectedDates[1];
                    state.patientFilter.datePreset = 'custom';
                }
            }
        });
        
        // Initialize search input listener
        const searchInput = document.getElementById('reportSearchInput');
        if (searchInput) {
            searchInput.addEventListener('keyup', function(e) {
                if (e.key === 'Enter') {
                    applyReportFilters();
                }
            });
        }
    }

    function attachReportsEventListeners() {
        // Add apply filters button listener
        const applyBtn = document.querySelector('button[onclick="applyReportFilters()"]');
        if (applyBtn) {
            applyBtn.addEventListener('click', function(e) {
                e.preventDefault();

    function applyReportFilters() {
        // Get search text
        const searchInput = document.getElementById('reportSearchInput');
        if (searchInput) {

                <div class="card-header">
                    <h3>🔒 Data Management</h3>
                </div>
                <div class="alert alert-warning">
                    <span style="font-size: 1.3rem;">⚠️</span>
                    <div>All data is stored in your browser's localStorage. Clearing browser data will delete all records.</div>
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button class="btn btn-danger" onclick="if(confirm('⚠️ This will delete ALL data! Are you sure?')) { localStorage.clear(); location.reload(); }">🗑️ Clear All Data</button>
                    <button class="btn btn-secondary" onclick="exportAllData()">📊 Export All Data</button>
                </div>
            </div>
        `;
    }

    function exportAllData() {
        const user = DB.getCurrentUser();
        if (!user) return;

        const allData = {
            user: user,
            settings: DB.get('settings')[0] || {},
            patients: DB.get('patients'),
            invoices: DB.get('invoices'),
            bills: DB.get('bills'),
            stock: DB.get('stock'),
            ledgers: DB.get('ledgers'),
            vouchers: DB.get('vouchers')
        };

        const dataStr = JSON.stringify(allData, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        
        const exportFileDefaultName = `ledgexis-backup-${user.email}-${new Date().toISOString().split('T')[0]}.json`;
        
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        linkElement.click();
    }

    // ============================================
    // INITIALIZATION
    // ============================================
    
    // Initialize database on page load
    DB.init();

    // Check if user is logged in
    const currentUser = DB.getCurrentUser();
    if (currentUser) {
        document.getElementById('gateway').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('userName').textContent = currentUser.labName;
        document.getElementById('userAvatar').textContent = currentUser.labName.substring(0, 2).toUpperCase();
        initApp();
    }
</script>

</body>
</html>
